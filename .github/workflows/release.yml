name: Release

# One tag, one platform, one release. Tags are <platform>-v<version> (silksong-v0.3.3,
# hk1221-v0.3.3, ...); release.sh at the repo root creates and pushes them. A multi-platform
# release is just several tags pushed together, which start several independent runs of this
# workflow - there is no shared state between them.

on:
  push:
    tags:
      - 'silksong-v*'
      - 'hk1221-v*'
      - 'hk1432-v*'
      - 'hk1578-v*'

jobs:
  release:
    # Same runner as the validation build, for the same reason - see build.yml.
    runs-on: windows-latest
    permissions:
      contents: write
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Parse tag
        run: |
          TAG="$GITHUB_REF_NAME"
          PLATFORM="${TAG%%-v*}"
          VERSION="${TAG#*-v}"
          case "$PLATFORM" in
            silksong) PROJECT=src/FsmMaster.Silksong/FsmMaster.Silksong.csproj; PREFIX=silk ;;
            hk1221)   PROJECT=src/FsmMaster.HK1221/FsmMaster.HK1221.csproj;     PREFIX=hk1221 ;;
            hk1432)   PROJECT=src/FsmMaster.HK1432/FsmMaster.HK1432.csproj;     PREFIX=hk1432 ;;
            hk1578)   PROJECT=src/FsmMaster.HK1578/FsmMaster.HK1578.csproj;     PREFIX=hk1578 ;;
            *) echo "::error::Unrecognised platform '$PLATFORM' in tag '$TAG'." ; exit 1 ;;
          esac
          {
            echo "TAG=$TAG"
            echo "PLATFORM=$PLATFORM"
            echo "VERSION=$VERSION"
            echo "PROJECT=$PROJECT"
            # Matches ModReleaseName from Directory.Build.targets: the zip each project writes
            # into release/ is named <prefix>_<version>.zip.
            echo "ZIP=release/${PREFIX}_${VERSION}.zip"
            echo "LATEST_ZIP=release/FsmMaster-${PLATFORM}.zip"
          } >> "$GITHUB_ENV"

      - name: Fetch Hollow Knight reference assemblies
        # Skipped for silksong, whose game assemblies come from NuGet - it has no use for the
        # Hollow Knight stubs, and must not be held up by a problem fetching them.
        if: env.PLATFORM != 'silksong'
        env:
          FSMMASTER_HK_REFS_TOKEN: ${{ secrets.FSMMASTER_HK_REFS_TOKEN }}
        run: ./fetch-hk-refs.sh

      - name: Check reference assemblies are present
        # Only the Silksong target gets its game assemblies from NuGet; releasing a Hollow Knight
        # target without the reference stubs cannot work, and must fail here rather than half way
        # through a build.
        run: |
          if [ "$PLATFORM" != "silksong" ] && [ ! -f CIRefs.props ]; then
            echo "::error::$PLATFORM needs the Hollow Knight reference assemblies, but FSMMASTER_HK_REFS_TOKEN is not configured."
            exit 1
          fi

      - name: Restore
        run: dotnet restore "$PROJECT"

      - name: Build
        # The version in Directory.Build.props is only the default; the tag is authoritative for a
        # release, so no file has to be edited to cut one.
        run: dotnet build "$PROJECT" --configuration Release --no-restore -p:Version="$VERSION"

      - name: Publish release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          test -f "$ZIP" || { echo "::error::Expected $ZIP to exist after the build."; exit 1; }
          gh release create "$TAG" "$ZIP" \
            --title "FsmMaster $VERSION ($PLATFORM)" \
            --notes "FsmMaster $VERSION for $PLATFORM. Install instructions are in the README."

      - name: Refresh rolling latest release
        # A release whose asset name never changes, so the README can link one URL per platform
        # that always points at the newest build. Recreated rather than updated so the tag moves
        # with it. The versioned release above keeps its versioned asset name and stays immutable,
        # which is what anything pinning a checksum (modlinks) must link to.
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cp "$ZIP" "$LATEST_ZIP"
          gh release delete "latest-$PLATFORM" -y --cleanup-tag || true
          gh release create "latest-$PLATFORM" "$LATEST_ZIP" \
            --target "$GITHUB_SHA" \
            --title "Latest ($PLATFORM)" \
            --notes "Rolling pointer to the newest $PLATFORM release, currently $VERSION ($TAG). This release is replaced on every $PLATFORM release; link to the versioned release instead if you need a stable checksum."
