name: Release

# One tag, one release, every platform in it. Tags are v<version> (v0.3.5), created by
# release.sh at the repo root, which also records which platforms the release covers in the
# tag's message. Each platform contributes one asset named FsmMaster-<platform>.zip, so both
# of the URLs that matter stay stable:
#
#   releases/latest/download/FsmMaster-hk1221.zip   always the newest release
#   releases/download/v0.3.5/FsmMaster-hk1578.zip   immutable, safe to pin a checksum to
#
# Including a platform is also what publishes it: a release containing silksong goes to
# Thunderstore, one containing hk1578 opens a modlinks PR. Leave a platform out and it is
# neither built nor published.

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    # The net35/net472 targets and the per-project ILRepack merge are only exercised on Windows
    # during development, and a release must be built the way it was tested.
    runs-on: windows-latest
    permissions:
      contents: write
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Read version and platforms from the tag
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="$GITHUB_REF_NAME"
          VERSION="${TAG#v}"
          ALL="silksong hk1221 hk1432 hk1578"

          # release.sh writes "platforms: <names>" into the annotated tag message. Read it from
          # the API rather than the checkout, so this does not depend on the tag object having
          # been fetched. A hand-made or lightweight tag has no such line and releases everything.
          OBJ=$(gh api "repos/$GITHUB_REPOSITORY/git/ref/tags/$TAG" --jq '.object.sha' 2>/dev/null || echo '')
          MESSAGE=$(gh api "repos/$GITHUB_REPOSITORY/git/tags/$OBJ" --jq '.message' 2>/dev/null || echo '')
          PLATFORMS=$(printf '%s\n' "$MESSAGE" | sed -n 's/^platforms:[[:space:]]*//p' | head -1)
          [ -n "$PLATFORMS" ] || PLATFORMS="$ALL"

          for platform in $PLATFORMS; do
            case " $ALL " in
              *" $platform "*) ;;
              *) echo "::error::Unrecognised platform '$platform' in the tag message." ; exit 1 ;;
            esac
          done

          echo "Releasing $VERSION for: $PLATFORMS"
          {
            echo "TAG=$TAG"
            echo "VERSION=$VERSION"
            echo "PLATFORMS=$PLATFORMS"
          } >> "$GITHUB_ENV"

      - name: Fetch Hollow Knight reference assemblies
        # Only the Hollow Knight targets need these; silksong's game assemblies come from NuGet,
        # so a silksong-only release must not be held up by them.
        if: contains(env.PLATFORMS, 'hk')
        env:
          FSMMASTER_HK_REFS_TOKEN: ${{ secrets.FSMMASTER_HK_REFS_TOKEN }}
        run: |
          ./fetch-hk-refs.sh
          if [ ! -f CIRefs.props ]; then
            echo "::error::This release includes Hollow Knight targets, but FSMMASTER_HK_REFS_TOKEN is not configured."
            exit 1
          fi

      - name: Build and stage each platform
        run: |
          mkdir -p staging
          for platform in $PLATFORMS; do
            case "$platform" in
              silksong) project=src/FsmMaster.Silksong/FsmMaster.Silksong.csproj; prefix=silk ;;
              hk1221)   project=src/FsmMaster.HK1221/FsmMaster.HK1221.csproj;     prefix=hk1221 ;;
              hk1432)   project=src/FsmMaster.HK1432/FsmMaster.HK1432.csproj;     prefix=hk1432 ;;
              hk1578)   project=src/FsmMaster.HK1578/FsmMaster.HK1578.csproj;     prefix=hk1578 ;;
            esac
            echo "::group::$platform"
            # The tag is authoritative for a release, so no file has to be edited to cut one.
            dotnet restore "$project"
            dotnet build "$project" --configuration Release --no-restore -p:Version="$VERSION"
            # Each project's own CreateReleaseZip target writes release/<prefix>_<version>.zip in
            # that loader's install layout; only the asset name is normalised here.
            built="release/${prefix}_${VERSION}.zip"
            test -f "$built" || { echo "::error::Expected $built after building $platform."; exit 1; }
            cp "$built" "staging/FsmMaster-${platform}.zip"
            echo "::endgroup::"
          done
          ls -l staging

      - name: Publish release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "$TAG" staging/*.zip \
            --title "FsmMaster $VERSION" \
            --notes "FsmMaster $VERSION for: $PLATFORMS. Install instructions are in the README."
