name: Build and Publish FsmMaster

on:
  push:
    branches: [main]
  pull_request:
  release:
    types: [published]

jobs:
  build:
    runs-on: ubuntu-latest   # netstandard2.1 doesn't need windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --configuration Release --no-restore

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: FsmMaster-build
          path: bin/Release/netstandard2.1/**

      - name: Upload Thunderstore package
        uses: actions/upload-artifact@v4
        with:
          name: FsmMaster-thunderstore-package
          path: thunderstore/build/*.zip

      - name: Upload manual install zip
        uses: actions/upload-artifact@v4
        with:
          name: FsmMaster-manual-zip
          path: thunderstore/manual/*.zip

  publish:
    needs: build
    if: github.event_name == 'release'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Resolve release version
        run: echo "RELEASE_VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"

      - name: Restore & Build
        run: |
          dotnet restore
          dotnet build --configuration Release --no-restore /p:Version=${{ env.RELEASE_VERSION }}

      - name: Publish to Thunderstore
        env:
          TCLI_AUTH_TOKEN: ${{ secrets.TCLI_AUTH_TOKEN }}
        run: dotnet tcli publish --config-path thunderstore/thunderstore.toml --file thunderstore/build/*.zip

      - name: Attach release assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "$GITHUB_REF_NAME" thunderstore/manual/*.zip thunderstore/build/*.zip --clobber
