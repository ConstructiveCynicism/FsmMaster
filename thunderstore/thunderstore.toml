[config]
schemaVersion = "0.0.1"

[package]
namespace = "Cynic_SR"
name = "FsmMaster"
description = "Visual FSM graph inspection, live editing, and debugging for PlayMaker FSMs in Silksong. Best used with DebugMod"
websiteUrl = "https://github.com/ConstructiveCynicism/Silksong.FsmMaster"
