[config]
schemaVersion = "0.0.1"

[package]
namespace = "ConstructiveCynicism"
name = "FsmMaster"
description = "Visual FSM graph inspection, live editing, and debugging for PlayMaker FSMs in Silksong. Best used with DebugMod"
websiteUrl = "https://github.com/ConstructiveCynicism/FsmMaster"
containsNsfwContent = false

[package.dependencies]
"BepInEx-BepInExPack" = "5.4.2100"
"silksong_modding-Modlist" = "0.3.1"

[build]
icon = "icon.png"
readme = "../README.md"
outdir = "./build"

[[build.copy]]
source = "./temp"
target = "/"

[publish]
repository = "https://thunderstore.io"
communities = [ "hollow-knight-silksong" ]

[publish.categories]
hollow-knight-silksong = [ "mods", "utility" ]